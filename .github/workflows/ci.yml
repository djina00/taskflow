name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TaskFlow.sln

      - name: Build
        run: dotnet build TaskFlow.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TaskFlow.sln --configuration Release --no-build --verbosity normal
